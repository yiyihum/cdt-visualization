<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>CDT + Adapter Visualization</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; margin: 0; overflow: hidden; background: #fff; }
  .main-svg { width: 100vw; height: 100vh; }
  .node { cursor: pointer; }
  .node text { font-size: 12px; }
  .link { fill: none; stroke: #b0bec5; stroke-width: 2.5px; }

  #tooltip {
    position: absolute; padding: 10px 14px; background: #fff; border: 1px solid #ddd;
    border-radius: 6px; box-shadow: 0 2px 8px rgba(0,0,0,0.15); max-width: 520px;
    font-size: 13px; line-height: 1.5; pointer-events: auto; display: none; z-index: 10;
  }
  #tooltip .gate { color: #e67e22; font-weight: 600; margin-bottom: 6px; }
  #tooltip .stmt { color: #2c3e50; margin: 2px 0; padding-left: 12px; text-indent: -12px; }
  #tooltip .stmt::before { content: "\2022 "; color: #3498db; }
  #tooltip .count { color: #7f8c8d; font-size: 11px; margin-top: 4px; }
  #tooltip .adapter-section { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
  #tooltip .adapter-action { font-weight: 600; margin-bottom: 4px; }
  #tooltip .adapter-action.modify { color: #e67e22; }
  #tooltip .adapter-action.delete { color: #e74c3c; }
  #tooltip .adapter-action.add { color: #27ae60; }
  #tooltip .old-stmt { color: #999; text-decoration: line-through; margin: 2px 0 2px 12px; font-size: 12px; }
  #tooltip .new-stmt { color: #2c3e50; margin: 2px 0 2px 12px; font-size: 12px; }
  #tooltip .coverage { color: #7f8c8d; font-size: 11px; margin-left: 12px; }
  #tooltip b { color: inherit; font-weight: 700; }

  #controls {
    position: absolute; top: 8px; left: 8px; z-index: 5;
    background: rgba(255,255,255,0.95); border: 1px solid #ddd;
    border-radius: 8px; padding: 8px 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    max-height: 90vh; overflow-y: auto; width: 185px;
  }
  #controls .subtitle { font-size: 10px; color: #888; margin-bottom: 1px; }
  #controls .title { font-size: 13px; font-weight: 700; color: #333; margin-bottom: 6px; }
  #controls .section-label { font-size: 10px; font-weight: 600; color: #888; margin: 8px 0 3px; text-transform: uppercase; letter-spacing: 0.5px; }
  #controls .phase-btn {
    display: block; width: 100%; text-align: left;
    padding: 5px 8px; margin: 2px 0; border: 1px solid #ddd; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 12px; color: #444;
    transition: all 0.15s;
  }
  #controls .phase-btn:hover { background: #f5f5f5; }
  #controls .phase-btn.active { background: #3498db; color: #fff; border-color: #2980b9; }
  #controls .phase-date { font-size: 10px; color: #888; margin-top: 1px; }
  #controls .phase-btn.active .phase-date { color: rgba(255,255,255,0.7); }
  #controls .phase-stats { font-size: 10px; color: #888; margin-top: 1px; }
  #controls .phase-btn.active .phase-stats { color: rgba(255,255,255,0.7); }

  #controls .case-btn {
    display: block; width: 100%; text-align: left;
    padding: 5px 8px; margin: 2px 0; border: 1px solid #9b59b6; border-radius: 4px;
    background: #fff; cursor: pointer; font-size: 11px; color: #8e44ad;
    transition: all 0.15s;
  }
  #controls .case-btn:hover { background: #f5eef8; }
  #controls .case-btn.active { background: #9b59b6; color: #fff; }
  #controls .case-btn .case-eid { font-weight: 600; }

  #legend {
    position: absolute; bottom: 12px; left: 12px; font-size: 12px; color: #666;
    background: rgba(255,255,255,0.85); padding: 6px 10px; border-radius: 4px;
  }
  #legend span { display: inline-block; width: 12px; height: 12px; border-radius: 50%; margin-right: 4px; vertical-align: middle; }

  #loading {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 16px; color: #888;
  }

  /* Case study panel */
  #case-panel {
    position: absolute; top: 0; right: 0; width: 850px; height: 100vh;
    background: #fff; border-left: 2px solid #9b59b6; z-index: 8;
    overflow-y: auto; display: none; box-shadow: -4px 0 12px rgba(0,0,0,0.1);
  }
  #case-panel .panel-header {
    position: sticky; top: 0; background: #9b59b6; color: #fff;
    padding: 12px 16px; font-size: 15px; font-weight: 700;
    display: flex; justify-content: space-between; align-items: center;
  }
  #case-panel .close-btn {
    background: none; border: none; color: #fff; font-size: 20px; cursor: pointer;
    padding: 0 4px; line-height: 1;
  }
  #case-panel .section { padding: 12px 16px; border-bottom: 1px solid #eee; }
  #case-panel .section-title { font-size: 13px; font-weight: 700; color: #555; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
  #case-panel .context-text { font-size: 13px; color: #555; line-height: 1.5; }
  #case-panel .ref-text { font-size: 13px; color: #2c3e50; font-weight: 600; }

  #case-panel .compare-cols { display: flex; gap: 0; }
  #case-panel .compare-col { flex: 1; padding: 12px; border-bottom: 1px solid #eee; }
  #case-panel .compare-col:first-child { border-right: 1px solid #eee; }
  #case-panel .col-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  #case-panel .col-title.base { color: #3498db; }
  #case-panel .col-title.adapted { color: #9b59b6; }

  #case-panel .stmt-item { font-size: 12px; color: #444; margin: 4px 0; padding: 4px 6px; border-radius: 3px; line-height: 1.4; }
  #case-panel .stmt-item.shared { background: #f0f0f0; }
  #case-panel .stmt-item.only-base { background: #ebf5fb; border-left: 3px solid #3498db; }
  #case-panel .stmt-item.only-adapted { background: #f5eef8; border-left: 3px solid #9b59b6; }

  #case-panel .pred-box { padding: 10px; border-radius: 6px; margin: 6px 0; font-size: 13px; line-height: 1.5; }
  #case-panel .pred-box.base-pred { background: #ebf5fb; border: 1px solid #3498db; }
  #case-panel .pred-box.adapted-pred { background: #f5eef8; border: 1px solid #9b59b6; }
  #case-panel .score-badge { display: inline-block; padding: 2px 8px; border-radius: 10px; font-size: 11px; font-weight: 700; color: #fff; margin-left: 6px; }
  #case-panel .score-50 { background: #e67e22; }
  #case-panel .score-100 { background: #27ae60; }
  #case-panel .score-0 { background: #e74c3c; }

  #case-panel .stmt-counts { font-size: 12px; color: #888; margin-top: 4px; }
  #case-panel .legend-mini { font-size: 11px; color: #888; margin: 8px 0 4px; }
  #case-panel .legend-mini span { display: inline-block; width: 10px; height: 10px; margin-right: 3px; vertical-align: middle; border-radius: 2px; }

  /* Statement detail panel */
  #stmt-panel {
    position: absolute; top: 0; right: 0; width: 700px; height: 100vh;
    background: #fff; border-left: 2px solid #2c3e50; z-index: 8;
    overflow-y: auto; display: none; box-shadow: -4px 0 12px rgba(0,0,0,0.1);
  }
  #stmt-panel .panel-header {
    position: sticky; top: 0; background: #2c3e50; color: #fff;
    padding: 12px 16px; font-size: 14px; font-weight: 700;
    display: flex; justify-content: space-between; align-items: center;
  }
  #stmt-panel .close-btn {
    background: none; border: none; color: #fff; font-size: 20px; cursor: pointer;
    padding: 0 4px; line-height: 1;
  }
  #stmt-panel .stmt-text { font-size: 13px; color: #2c3e50; line-height: 1.5; font-weight: 600; padding: 12px 16px; border-bottom: 1px solid #eee; }
  #stmt-panel .coverage-source { font-size: 11px; color: #888; padding: 4px 16px 8px; border-bottom: 1px solid #eee; }
  #stmt-panel .evt-section { padding: 8px 16px; }
  #stmt-panel .evt-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin: 8px 0; }
  #stmt-panel .evt-section-title.yes { color: #27ae60; }
  #stmt-panel .evt-section-title.no { color: #e74c3c; }
  #stmt-panel .event-card {
    padding: 8px 10px; margin: 4px 0; border-radius: 4px; font-size: 12px; line-height: 1.4;
    border-left: 3px solid #ddd; background: #fafafa;
  }
  #stmt-panel .event-card.yes-card { border-left-color: #27ae60; }
  #stmt-panel .event-card.no-card { border-left-color: #e74c3c; }
  #stmt-panel .event-id { font-weight: 700; color: #2c3e50; margin-right: 6px; }
  #stmt-panel .event-date { color: #888; font-size: 11px; }
  #stmt-panel .event-title { color: #444; margin: 2px 0; }
  #stmt-panel .event-action { color: #666; font-size: 11px; margin-top: 2px; }
  #stmt-panel .no-data { color: #999; font-style: italic; padding: 12px 16px; }

  /* Clickable statements in tooltip */
  #tooltip .clickable-stmt { cursor: pointer; transition: background 0.15s; padding: 1px 2px; margin: 1px -2px; border-radius: 3px; }
  #tooltip .clickable-stmt:hover { background: #e8f4fd; }

  /* Node highlighting for case study */
  .node-glow-base { filter: drop-shadow(0 0 4px #3498db); }
  .node-glow-adapted { filter: drop-shadow(0 0 4px #9b59b6); }
  .node-glow-both { filter: drop-shadow(0 0 4px #e67e22); }
  .node-dimmed { opacity: 0.2; }
  .link-dimmed { opacity: 0.15; }
</style>
</head>
<body>
<div id="loading">Loading data...</div>
<div id="controls" style="display:none"></div>
<div id="legend" style="display:none">
  <span style="background:#3498db;border:2px solid #2980b9"></span> Unchanged &nbsp;
  <span style="background:#e67e22;border:2px solid #d35400"></span> Modified &nbsp;
  <span style="background:#e74c3c;border:2px solid #c0392b"></span> Deleted &nbsp;
  <span style="background:#27ae60;border:2px solid #1e8449"></span> Added &nbsp;
  | Click node to expand, hover for details, click statement for events
</div>
<div id="tooltip"></div>
<div id="case-panel"></div>
<div id="stmt-panel"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

// =========== Data Loading ===========
Promise.all([
  fetch('data/cdt_with_keywords.json').then(r => r.json()),
  fetch('data/adapter_phases.json').then(r => r.json()),
  fetch('data/case_studies.json').then(r => r.json()),
  fetch('data/case_activations.json').then(r => r.json()),
  fetch('data/events.json').then(r => r.json()),
  fetch('data/coverage.json').then(r => r.json()),
]).then(([treeData, adapterPhases, caseStudies, caseActivations, eventsData, coverageData]) => {
  document.getElementById('loading').remove();
  document.getElementById('controls').style.display = '';
  document.getElementById('legend').style.display = '';
  init(treeData, adapterPhases, caseStudies, caseActivations, eventsData, coverageData);
}).catch(err => {
  document.getElementById('loading').textContent = 'Failed to load data: ' + err.message;
});

// =========== Keyword Highlighting ===========
function hl(text, keywords) {
  if (!keywords || keywords.length === 0) return text;
  const sorted = [...keywords].sort((a, b) => b.length - a.length);
  const escaped = sorted.map(k => k.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'));
  const re = new RegExp('\\b(' + escaped.join('|') + ')\\b', 'gi');
  return text.replace(re, '<b>$1</b>');
}

// =========== Main Visualization ===========
function init(treeData, adapterPhases, caseStudies, caseActivations, eventsData, coverageData) {

const ACTION_COLORS = { modify: "#e67e22", delete: "#e74c3c", add: "#27ae60" };
const DEFAULT_COLOR = "#3498db";
const EMPTY_COLOR = "#e8e8e8";
const CASE_BASE_COLOR = "#3498db";
const CASE_ADAPTED_COLOR = "#9b59b6";

let activePhaseIdx = -1;
let activeActions = {};
let activeCaseIdx = -1;

// =========== Controls ===========
const controls = d3.select("#controls");
controls.append("div").attr("class", "subtitle").text("OpenAI Behavior Simulation");
controls.append("div").attr("class", "title").text("CDT Visualization");

controls.append("div").attr("class", "section-label").text("Adapter Phases");

controls.append("button")
  .attr("class", "phase-btn active")
  .attr("data-idx", -1)
  .html("Base CDT <div class='phase-date'>Original tree</div>")
  .on("click", function() { clearCase(); selectPhase(-1); });

adapterPhases.forEach((phase, i) => {
  const modCount = phase.actions.filter(a => a.action === "modify").length;
  const addCount = phase.actions.filter(a => a.action === "add").length;
  const delCount = phase.actions.filter(a => a.action === "delete").length;
  controls.append("button")
    .attr("class", "phase-btn")
    .attr("data-idx", i)
    .html(`Phase ${i}
      <div class="phase-date">${phase.phase_name}</div>
      <div class="phase-stats">${phase.date_range}</div>
      <div class="phase-stats">${modCount} modify, ${addCount} add, ${delCount} delete</div>`)
    .on("click", function() { clearCase(); selectPhase(i); });
});

controls.append("div").attr("class", "section-label").text("Case Studies");

caseStudies.forEach((cs, i) => {
  controls.append("button")
    .attr("class", "case-btn")
    .attr("data-case-idx", i)
    .html(`<span class="case-eid">${cs.event_id}</span> <span style="font-size:10px">(P${cs.phase})</span><div class="phase-date" style="color:#a569bd">Score: ${cs.base_cdt.score} → ${cs.adapted_cdt.score}</div>`)
    .on("click", function() { selectCase(i); });
});

function selectPhase(idx) {
  activePhaseIdx = idx;
  controls.selectAll(".phase-btn").classed("active", function() {
    return +this.getAttribute("data-idx") === idx;
  });
  activeActions = {};
  if (idx >= 0 && idx < adapterPhases.length) {
    adapterPhases[idx].actions.forEach(a => {
      if (!activeActions[a.node_id]) activeActions[a.node_id] = [];
      activeActions[a.node_id].push(a);
    });
  }
  renderPies();
}

// =========== Case Study Logic ===========
function selectCase(idx) {
  activeCaseIdx = idx;
  controls.selectAll(".case-btn").classed("active", function() {
    return +this.getAttribute("data-case-idx") === idx;
  });
  controls.selectAll(".phase-btn").classed("active", false);
  activeActions = {};

  const cs = caseStudies[idx];
  const act = caseActivations[idx];

  // Highlight activated nodes on the tree
  highlightCaseNodes(act);

  // Show the comparison panel
  showCasePanel(cs, act);
}

function clearCase() {
  activeCaseIdx = -1;
  controls.selectAll(".case-btn").classed("active", false);
  d3.select("#case-panel").style("display", "none");
  // Remove node highlights
  g.selectAll("g.node")
    .classed("node-glow-base", false)
    .classed("node-glow-adapted", false)
    .classed("node-glow-both", false)
    .classed("node-dimmed", false);
  g.selectAll("path.link").classed("link-dimmed", false);
}

function highlightCaseNodes(act) {
  const baseIds = new Set(act.base_cdt.activated_node_ids);
  const adaptedIds = new Set(act.adapted_cdt.activated_node_ids);
  const allActive = new Set([...baseIds, ...adaptedIds]);

  g.selectAll("g.node").each(function(d) {
    const el = d3.select(this);
    const nid = d.data.node_id;
    const inBase = baseIds.has(nid);
    const inAdapted = adaptedIds.has(nid);

    el.classed("node-dimmed", !allActive.has(nid));
    el.classed("node-glow-both", inBase && inAdapted);
    el.classed("node-glow-base", inBase && !inAdapted);
    el.classed("node-glow-adapted", !inBase && inAdapted);
  });

  g.selectAll("path.link").classed("link-dimmed", true);
}

function showCasePanel(cs, act) {
  const panel = d3.select("#case-panel");
  panel.style("display", "block");

  const baseStmts = act.base_cdt.all_statements;
  const adaptedStmts = act.adapted_cdt.all_statements;
  const baseSet = new Set(baseStmts);
  const adaptedSet = new Set(adaptedStmts);

  const shared = baseStmts.filter(s => adaptedSet.has(s));
  const onlyBase = baseStmts.filter(s => !adaptedSet.has(s));
  const onlyAdapted = adaptedStmts.filter(s => !baseSet.has(s));

  const scoreBadge = (score) => `<span class="score-badge score-${score}">${score}</span>`;

  let html = `
    <div class="panel-header">
      ${cs.event_id} &mdash; Phase ${cs.phase}
      <button class="close-btn" onclick="document.getElementById('case-panel').style.display='none'">&times;</button>
    </div>

    <div class="section">
      <div class="section-title">Context</div>
      <div class="context-text">${act.context}</div>
    </div>

    <div class="section">
      <div class="section-title">Ground Truth</div>
      <div class="ref-text">${act.reference}</div>
    </div>

    <div class="section">
      <div class="section-title">Predictions</div>
      <div class="pred-box base-pred">
        <b style="color:#3498db">Base CDT</b> ${scoreBadge(cs.base_cdt.score)}<br>
        ${cs.base_cdt.prediction}
      </div>
      <div class="pred-box adapted-pred">
        <b style="color:#9b59b6">Adapted CDT</b> ${scoreBadge(cs.adapted_cdt.score)}<br>
        ${cs.adapted_cdt.prediction}
      </div>
    </div>

    <div class="section">
      <div class="section-title">Key Difference</div>
      <div class="context-text">${cs.analysis.key_difference}</div>
    </div>

    <div class="section">
      <div class="section-title">Analysis</div>
      <div class="context-text">${cs.analysis.why_adapter_wins}</div>
    </div>

    <div class="section">
      <div class="section-title">Activated Statements Comparison</div>
      <div class="stmt-counts">
        Base CDT: <b>${baseStmts.length}</b> statements &nbsp;|&nbsp;
        Adapted CDT: <b>${adaptedStmts.length}</b> statements &nbsp;|&nbsp;
        Shared: <b>${shared.length}</b> &nbsp;|&nbsp;
        <span style="color:#3498db">Only Base: <b>${onlyBase.length}</b></span> &nbsp;|&nbsp;
        <span style="color:#9b59b6">Only Adapted: <b>${onlyAdapted.length}</b></span>
      </div>
      <div class="legend-mini">
        <span style="background:#f0f0f0;border:1px solid #ddd"></span> Shared &nbsp;
        <span style="background:#ebf5fb;border:1px solid #3498db"></span> Only Base &nbsp;
        <span style="background:#f5eef8;border:1px solid #9b59b6"></span> Only Adapted
      </div>
    </div>

    <div class="compare-cols">
      <div class="compare-col">
        <div class="col-title base">Base CDT (${baseStmts.length})</div>
        ${baseStmts.map(s => {
          const cls = adaptedSet.has(s) ? 'shared' : 'only-base';
          return `<div class="stmt-item ${cls}">${s}</div>`;
        }).join('')}
      </div>
      <div class="compare-col">
        <div class="col-title adapted">Adapted CDT (${adaptedStmts.length})</div>
        ${adaptedStmts.map(s => {
          const cls = baseSet.has(s) ? 'shared' : 'only-adapted';
          return `<div class="stmt-item ${cls}">${s}</div>`;
        }).join('')}
      </div>
    </div>
  `;

  panel.html(html);
}

// =========== Pie helpers ===========
function getNodeActionTypes(d) {
  const actions = activeActions[d.data.node_id];
  if (!actions) return [];
  const unique = [...new Set(actions.map(a => a.action))];
  const order = ["delete", "modify", "add"];
  return order.filter(t => unique.includes(t));
}

function nodeRadius(d) {
  return 4 + Math.min(d.data.statements.length, 6) * 1.5;
}

function defaultColor(d) {
  return d.data.statements.length > 0 ? DEFAULT_COLOR : EMPTY_COLOR;
}

const arcGen = d3.arc();

function pieSlices(types, r) {
  if (types.length === 0) return [];
  const angleEach = (2 * Math.PI) / types.length;
  return types.map((t, i) => ({
    type: t,
    color: ACTION_COLORS[t],
    path: arcGen({
      innerRadius: 0, outerRadius: r,
      startAngle: i * angleEach,
      endAngle: (i + 1) * angleEach,
    }),
  }));
}

function renderPies() {
  g.selectAll("g.node").each(function(d) {
    const el = d3.select(this);
    const r = nodeRadius(d);
    const types = getNodeActionTypes(d);

    el.selectAll(".pie-slice").remove();
    el.select("circle").remove();

    if (types.length <= 1) {
      const color = types.length === 1 ? ACTION_COLORS[types[0]] : defaultColor(d);
      el.insert("circle", "text")
        .attr("r", r)
        .style("fill", color)
        .style("stroke", d3.color(color).darker(0.3))
        .style("stroke-width", 2);
    } else {
      const slices = pieSlices(types, r);
      slices.forEach(s => {
        el.insert("path", "text")
          .attr("class", "pie-slice")
          .attr("d", s.path)
          .style("fill", s.color)
          .style("stroke", "#fff")
          .style("stroke-width", 1);
      });
      el.insert("circle", "text")
        .attr("r", r)
        .style("fill", "none")
        .style("stroke", "#666")
        .style("stroke-width", 1.5);
    }
  });
}

// =========== Main Tree ===========
const margin = {top: 40, right: 120, bottom: 40, left: 160};
const width = window.innerWidth - margin.left - margin.right;
const height = window.innerHeight - margin.top - margin.bottom;

const svg = d3.select("body").append("svg")
  .attr("class", "main-svg")
  .attr("width", width + margin.left + margin.right)
  .attr("height", height + margin.top + margin.bottom);

const g = svg.append("g")
  .attr("transform", `translate(${margin.left},${margin.top})`);

const zoomBehavior = d3.zoom().scaleExtent([0.2, 3]).on("zoom", (e) => {
  g.attr("transform", e.transform);
});
svg.call(zoomBehavior);

const tree = d3.tree().nodeSize([40, 280]);
const root = d3.hierarchy(treeData);
root.x0 = height / 2;
root.y0 = 0;

const tooltip = d3.select("#tooltip");
let nodeIdCounter = 0;
let tooltipTimeout = null;

tooltip.on("mouseover", () => clearTimeout(tooltipTimeout))
  .on("mouseout", () => { tooltipTimeout = setTimeout(() => tooltip.style("display", "none"), 200); });

update(root);

// Center the tree initially
const initX = width / 2;
const initY = height / 2;
svg.call(zoomBehavior.transform, d3.zoomIdentity.translate(initX, initY).scale(0.8));

function update(source) {
  const treeLayout = tree(root);
  const nodes = treeLayout.descendants();
  const links = treeLayout.links();

  nodes.forEach(d => d.y = d.depth * 280);

  const node = g.selectAll("g.node").data(nodes, d => d.id || (d.id = ++nodeIdCounter));

  const nodeEnter = node.enter().append("g")
    .attr("class", "node")
    .attr("transform", d => `translate(${source.y0},${source.x0})`)
    .on("click", (e, d) => { toggle(d); update(d); })
    .on("mouseover", (e, d) => { clearTimeout(tooltipTimeout); showTooltip(e, d); })
    .on("mouseout", () => { tooltipTimeout = setTimeout(() => tooltip.style("display", "none"), 200); });

  nodeEnter.append("circle")
    .attr("r", d => nodeRadius(d))
    .style("fill", d => defaultColor(d))
    .style("stroke", d => d3.color(defaultColor(d)).darker(0.3))
    .style("stroke-width", 2);

  nodeEnter.append("text")
    .attr("dy", "0.35em")
    .text(d => d.data.name)
    .style("fill", "#333");

  const nodeUpdate = nodeEnter.merge(node);
  nodeUpdate.transition().duration(400)
    .attr("transform", d => `translate(${d.y},${d.x})`);

  nodeUpdate.select("text")
    .attr("x", d => (d.children || d._children) ? -12 : 12)
    .attr("text-anchor", d => (d.children || d._children) ? "end" : "start");

  const nodeExit = node.exit().transition().duration(400)
    .attr("transform", d => `translate(${source.y},${source.x})`)
    .remove();
  nodeExit.select("circle").attr("r", 1e-6);

  const link = g.selectAll("path.link").data(links, d => d.target.id);

  link.enter().insert("path", "g")
    .attr("class", "link")
    .attr("d", d => { const o = {x: source.x0, y: source.y0}; return diagonal(o, o); })
    .merge(link)
    .transition().duration(400)
    .attr("d", d => diagonal(d.source, d.target));

  link.exit().transition().duration(400)
    .attr("d", d => { const o = {x: source.x, y: source.y}; return diagonal(o, o); })
    .remove();

  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });

  renderPies();
}

function diagonal(s, d) {
  return `M ${s.y} ${s.x} C ${(s.y + d.y) / 2} ${s.x}, ${(s.y + d.y) / 2} ${d.x}, ${d.y} ${d.x}`;
}

function toggle(d) {
  if (d.children) { d._children = d.children; d.children = null; }
  else { d.children = d._children; d._children = null; }
}

function showTooltip(event, d) {
  let html = '';
  if (d.data.gate) {
    html += `<div class="gate">Gate: ${hl(d.data.gate, d.data.gate_keywords)}</div>`;
  }
  html += `<div style="color:#aaa;font-size:11px;margin-bottom:4px">Node: ${d.data.node_id}</div>`;

  if (d.data.statements.length > 0) {
    d.data.statements.forEach(s => {
      const esc = s.text.replace(/"/g, '&quot;');
      html += `<div class="stmt clickable-stmt" data-statement="${esc}">${hl(s.text, s.keywords)}</div>`;
    });
  } else {
    html += `<div class="stmt" style="color:#999">No statements (pure router)</div>`;
  }
  const nChildren = (d.children || d._children || []).length;
  if (nChildren > 0) html += `<div class="count">${nChildren} sub-branches</div>`;

  // Adapter actions
  const actions = activeActions[d.data.node_id];
  if (actions && actions.length > 0) {
    html += '<div class="adapter-section">';
    actions.forEach(a => {
      html += `<div class="adapter-action ${a.action}">${a.action.toUpperCase()}</div>`;
      if (a.action === "delete") {
        const esc = a.old_statement.replace(/"/g, '&quot;');
        html += `<div class="old-stmt clickable-stmt" data-statement="${esc}">${hl(a.old_statement, a.old_keywords)}</div>`;
      } else if (a.action === "modify") {
        const escOld = a.old_statement.replace(/"/g, '&quot;');
        const escNew = a.new_statement.replace(/"/g, '&quot;');
        html += `<div class="old-stmt clickable-stmt" data-statement="${escOld}">${hl(a.old_statement, a.old_keywords)}</div>`;
        html += `<div class="new-stmt clickable-stmt" data-statement="${escNew}">&rarr; ${hl(a.new_statement, a.new_keywords)}</div>`;
        if (a.old_coverage != null && a.new_coverage != null) {
          html += `<div class="coverage">Coverage: ${(a.old_coverage*100).toFixed(0)}% &rarr; ${(a.new_coverage*100).toFixed(0)}%</div>`;
        }
      } else if (a.action === "add") {
        const esc = a.new_statement.replace(/"/g, '&quot;');
        html += `<div class="new-stmt clickable-stmt" data-statement="${esc}">+ ${hl(a.new_statement, a.new_keywords)}</div>`;
        if (a.new_coverage != null) {
          html += `<div class="coverage">Coverage: ${(a.new_coverage*100).toFixed(0)}%` +
                  (a.n_events ? ` (${a.n_events} events)` : '') + `</div>`;
        }
      }
    });
    html += '</div>';
  }

  tooltip.html(html).style("display", "block")
    .style("left", (event.pageX + 15) + "px")
    .style("top", (event.pageY - 10) + "px");

  // Bind click handlers on clickable statements
  tooltip.selectAll('.clickable-stmt').on('click', function() {
    const stmtText = this.getAttribute('data-statement');
    showStatementPanel(stmtText);
  });
}

// =========== Statement Detail Panel ===========
function showStatementPanel(stmtText) {
  d3.select("#case-panel").style("display", "none");

  const panel = d3.select("#stmt-panel");
  const coverage = coverageData[stmtText];

  if (!coverage) {
    panel.style("display", "block").html(`
      <div class="panel-header">
        Statement Coverage
        <button class="close-btn" onclick="document.getElementById('stmt-panel').style.display='none'">&times;</button>
      </div>
      <div class="stmt-text">${stmtText}</div>
      <div class="no-data">No coverage data available for this statement.</div>
    `);
    return;
  }

  const makeCards = (eids, cls) => eids.map(eid => {
    const e = eventsData[eid] || {};
    return `<div class="event-card ${cls}">
      <span class="event-id">${eid}</span>
      <span class="event-date">${e.date || ''}</span>
      <div class="event-title">${e.title || ''}</div>
      <div class="event-action">${e.action || ''}</div>
    </div>`;
  }).join('');

  const yesIds = coverage.yes || [];
  const noIds = coverage.no || [];

  panel.style("display", "block").html(`
    <div class="panel-header">
      Statement Coverage
      <button class="close-btn" onclick="document.getElementById('stmt-panel').style.display='none'">&times;</button>
    </div>
    <div class="stmt-text">${stmtText}</div>
    <div class="coverage-source">Source: ${coverage.source} &nbsp;|&nbsp; Node: ${coverage.node_id} &nbsp;|&nbsp; ${yesIds.length} supporting, ${noIds.length} opposing</div>
    <div class="evt-section">
      <div class="evt-section-title yes">Supporting Events (${yesIds.length})</div>
      ${makeCards(yesIds, 'yes-card')}
    </div>
    <div class="evt-section">
      <div class="evt-section-title no">Opposing Events (${noIds.length})</div>
      ${makeCards(noIds, 'no-card')}
    </div>
  `);
}

} // end init()
</script>
</body>
</html>
